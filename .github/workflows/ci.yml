name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar cheatsheets obrigatórios
        run: |
          for i in 01 02 03 04 05 06 07 99; do
            ls cheatsheet/${i}-*.md >/dev/null 2>&1 || { echo "falta cheatsheet $i"; exit 1; }
          done
          echo "OK — 8 cheatsheets presentes."

      - name: Validar frontmatter dos cheatsheets
        run: |
          for f in cheatsheet/*.md; do
            head -1 "$f" | grep -q '^---$' || { echo "$f sem frontmatter"; exit 1; }
          done
          echo "OK — frontmatter presente em todos os cheatsheets."

      - name: Validar templates obrigatórios
        run: |
          for f in buscar-por-pk buscar-por-criterio criar-registro atualizar-registro deletar-registro; do
            test -f "templates/${f}.java" || { echo "falta template ${f}.java"; exit 1; }
          done
          echo "OK — 5 templates presentes."

      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Syntax check templates (rejeita erros de parse; aceita symbol ausente)
        run: |
          set -e
          fail=0
          for f in templates/*.java; do
            echo "=== $f ==="
            javac -sourcepath templates -proc:none -Xstdout /tmp/err.log "$f" 2>/dev/null || true
            if grep -E "error: (illegal|expected|reached end|';' expected|'\\{' expected|'\\}' expected)" /tmp/err.log; then
              echo "ERRO DE SINTAXE em $f"
              fail=1
            fi
          done
          exit $fail
